<div class="product-card">
  <div class="card-inner">
    <div class="card-front">
      <img [src]="product().image" [alt]="product().name" />
    </div>

    <div class="card-back">
      <h3>{{ product().name }}</h3>
      <p>{{ product().description }}</p>
      <button type="button" class="shop-btn">Shop Now</button>
    </div>
  </div>
</div>
